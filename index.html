  <title>Waqcha Coffee Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      font-family: 'Jost', sans-serif;
    }

    .lt-logo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #c9a84c;
      margin-bottom: 1.25rem;
      flex-shrink: 0;
    }

    .lt-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .lt-tagline {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c9a84c;
      text-align: center;
      margin-bottom: 0.55rem;
    }

    .lt-slogan {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 15px;
      color: #c9a84c;
      text-align: center;
      letter-spacing: 0.03em;
      line-height: 1.5;
      opacity: 0.88;
      max-width: 300px;
      margin-bottom: 2.5rem;
    }

    .lt-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 400px;
    }

    .lt-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 0.5px solid #2e2e2e;
      border-radius: 12px;
      background: #161616;
      color: #f0f0f0;
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      width: 100%;
    }

    .lt-btn:hover {
      background: #1e1e1e;
      border-color: #c9a84c;
    }

    .lt-btn:hover .lt-icon {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .lt-btn:hover .lt-arrow {
      color: #c9a84c;
    }

    .lt-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 17px;
      border: 0.5px solid #333;
      background: #1f1f1f;
      color: #888;
      transition: color 0.18s, border-color 0.18s;
    }

    .lt-label { flex: 1; text-align: left; }

    .lt-sub {
      display: block;
      font-size: 11px;
      color: #555;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }

    .lt-arrow {
      color: #333;
      font-size: 14px;
      transition: color 0.18s;
    }

    .lt-section-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c9a84c;
      text-align: center;
      margin: 0.75rem 0 0.1rem;
      opacity: 0.7;
    }

    .lt-divider {
      width: 40px;
      height: 0.5px;
      background: #c9a84c;
      margin: 2.5rem auto 0;
      opacity: 0.3;
    }
  </style>
